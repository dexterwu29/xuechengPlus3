# ============================================================
# 本地配置模板 - 复制本文件为 application-local.yml 并填入你的信息
#
# 复制命令:
#   Windows: copy application-example.yml application-local.yml
#   Linux/Mac: cp application-example.yml application-local.yml
#
# 注意: application-local.yml 已被 .gitignore 排除
# ============================================================

spring:
  cloud:
    nacos:
      discovery:
        server-addr: <你的Nacos服务器IP>:8848
        username: nacos
        password: <你的Nacos密码>
      config:
        server-addr: <你的Nacos服务器IP>:8848
        username: nacos
        password: <你的Nacos密码>
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://<你的MySQL地址>:3306/xcplus_content?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&useSSL=false
    username: <你的MySQL用户名>
    password: <你的MySQL密码>

# MinIO（媒资存储，腾讯云或本地 docker）
# bucket: 主桶，启动时不存在会自动创建
# bucket-video / bucket-doc: 可选，视频/文档分桶；不配置则都用 bucket
minio:
  endpoint: http://<MinIO地址>:9000
  access-key: minioadmin
  secret-key: <MinIO密码>
  bucket: xcplus3
  # bucket-video: xcplus3-video
  # bucket-doc: xcplus3-doc
  chunk-size: 5242880

# 视频转码配置（31.4：支持AVI等格式转码为MP4）
# Windows 示例: D:\ffmpeg\bin\ffmpeg.exe
# Linux 示例: /usr/bin/ffmpeg
transcode:
  ffmpeg-path: <FFmpeg可执行文件路径>
  # ffprobe-path 如果不配置，会从ffmpeg路径自动推导
  auto-transcode: true
  timeout-seconds: 600

# 测试账号见 docs/TEST-ACCOUNTS-local-example.md
