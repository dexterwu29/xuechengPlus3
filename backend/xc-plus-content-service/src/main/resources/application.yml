# 学成在线 - 课程管理内容服务基础配置
# 本地覆盖：复制 application-example.yml 为 application-local.yml 并填入你的信息

spring:
  # 文件上传限制（分片每片约 5MB，需 ≥5MB；大视频建议 100MB）
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  # DevTools 热部署：改 Java 代码后自动重启（需 IDE 开启自动编译）
  devtools:
    restart:
      enabled: true
  application:
    name: xc-plus-content-service
  profiles:
    active: local
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        group: DEFAULT_GROUP
        file-extension: yaml
  config:
    import:
      - optional:nacos:xc-plus-content-service.yaml?group=DEFAULT_GROUP
      # 31.4：profile 专用配置（如 local），可覆盖 transcode 等本地路径
      - optional:nacos:xc-plus-content-service-${spring.profiles.active}.yaml?group=DEFAULT_GROUP
  jackson:
    date-format: "yyyy-MM-dd'T'HH:mm:ss"
    time-zone: "Asia/Shanghai"
    serialization:
      write-dates-as-timestamps: false

server:
  port: 11001
  servlet:
    context-path: /content

management:
  endpoints:
    web:
      exposure:
        include: health,info

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    # 控制台打印 SQL 日志（开发调试用，生产可关闭）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j + SpringDoc（doc.html 访问：http://localhost:11001/content/doc.html）
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
knife4j:
  enable: true
  setting:
    language: zh_cn

# JWT（本地可覆盖）
jwt:
  secret: xcplus3-default-secret-key-at-least-32-bytes-long
  expiration-ms: 86400000

# MinIO 默认（本地覆盖用 application-local.yml）
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: xcplus
  chunk-size: 5242880
