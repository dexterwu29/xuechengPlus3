<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${course.name} ?: '课程预览'">课程预览</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; line-height: 1.6; color: #333; max-width: 900px; margin: 0 auto; padding: 20px; }
        h1 { margin-bottom: 16px; font-size: 1.75rem; }
        .meta { color: #666; font-size: 0.9rem; margin-bottom: 20px; }
        .meta span { margin-right: 16px; }
        .description { margin: 24px 0; padding: 16px; background: #f8f9fa; border-radius: 8px; white-space: pre-wrap; }
        .teachplan { margin-top: 24px; }
        .teachplan h2 { font-size: 1.25rem; margin-bottom: 12px; color: #1a1a1a; }
        .chapter { margin: 16px 0; padding: 12px; background: #f0f4f8; border-radius: 6px; }
        .section { margin: 8px 0 8px 24px; padding: 8px; }
        .section-title { font-weight: 500; }
        .media-list { margin-top: 4px; font-size: 0.9rem; color: #555; }
        .contact { margin-top: 32px; padding: 20px; background: #e8f4fd; border-radius: 8px; }
        .contact h3 { margin-bottom: 12px; font-size: 1.1rem; }
        .contact p { margin: 4px 0; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; margin-right: 4px; }
        .badge-price { background: #ff6b6b; color: white; }
        .badge-free { background: #51cf66; color: white; }
    </style>
</head>
<body>
    <h1 th:text="${course.name}">课程名称</h1>
    <div class="meta">
        <span th:if="${course.companyName}" th:text="'机构：' + ${course.companyName}">机构</span>
        <span th:if="${course.users}" th:text="'适用：' + ${course.users}">适用人群</span>
        <span th:if="${course.grade}" th:text="'等级：' + ${course.grade}">等级</span>
        <span th:if="${course.charge == '201001'}" class="badge badge-free">免费</span>
        <span th:if="${course.charge == '201002' && course.price != null}" class="badge badge-price" th:text="'¥' + ${course.price}">价格</span>
    </div>
    <div th:if="${course.description}" class="description" th:text="${course.description}">课程介绍</div>
    <div class="teachplan">
        <h2>教学大纲</h2>
        <th:block th:each="chapter : ${teachplans}">
            <div class="chapter">
                <div class="section-title" th:text="${chapter.pname}">章名称</div>
                <th:block th:each="section : ${chapter.children}">
                    <div class="section">
                        <div class="section-title" th:text="${section.pname}">节名称</div>
                        <div class="media-list" th:if="${section.mediaList != null && !section.mediaList.isEmpty()}">
                            <span th:each="m, iterStat : ${section.mediaList}">
                                <span th:text="${m.mediaFileName} ?: m.fileId">文件名</span><span th:if="${!iterStat.last}">、</span>
                            </span>
                        </div>
                    </div>
                </th:block>
            </div>
        </th:block>
    </div>
    <div th:if="${isPublic}" class="contact">
        <h3>报名咨询</h3>
        <p th:if="${course.qq}">QQ：<span th:text="${course.qq}"></span></p>
        <p th:if="${course.wechat}">微信：<span th:text="${course.wechat}"></span></p>
        <p th:if="${course.phone}">电话：<span th:text="${course.phone}"></span></p>
    </div>
</body>
</html>
